name: dashbrrd
options:
  bundleIdPrefix: com.dashbrrd
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  dashbrrd-core:
    path: Packages/dashbrrd-core

targets:
  dashbrrd:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dashbrrd.app
        PRODUCT_NAME: dashbrrd
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/dashbrrd.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: dashbrrd-core
        product: AppCore
